name: Daily data refresh + retrain

on:
  schedule:
    # 23:00 UTC, Mon-Fri = ~6-7pm US Eastern, after the market close so the
    # day's final daily bar is available from yfinance.
    - cron: "0 23 * * 1-5"
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit refreshed data + models

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data + retrain
        run: python -m scripts.daily_update --years 20

      - name: Commit & push updated data and models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/daily models/lgbm_dash
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily refresh + retrain ($(date -u +%Y-%m-%d))"
            git push
          fi
