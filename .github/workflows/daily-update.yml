name: Daily data refresh + retrain

on:
  schedule:
    # Fire ~20 min after the 4:00pm ET close. GitHub cron is UTC-only and can't
    # track daylight saving, so we schedule BOTH: 20:20 UTC works in summer
    # (EDT, close = 20:00 UTC) and 21:20 UTC works in winter (EST, close = 21:00
    # UTC). Each day one run lands right after the close and the other is a
    # harmless idempotent re-fetch of the same final bar.
    - cron: "20 20 * * 1-5"   # ~4:20pm ET during EDT (summer)
    - cron: "20 21 * * 1-5"   # ~4:20pm ET during EST (winter)
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit refreshed data + models

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data + retrain
        run: python -m scripts.daily_update --years 20

      - name: Commit & push updated data and models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/daily models/lgbm_dash
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily refresh + retrain ($(date -u +%Y-%m-%d))"
            git push
          fi
