universe:
  asset_class: equity   # 'crypto' | 'equity'
  quote_asset: USD

  # ---- crypto block (active when asset_class = crypto) ----
  assets:
    - BTC
    - ETH
    - XRP
  tradable_pairs:
    - BTC/USD
    - ETH/USD
    - XRP/USD
  banned_quote_assets:
    - USDT
    - USDC
    - BUSD
    - DAI
    - FDUSD
    - TUSD

  # ---- equity block (active when asset_class = equity) ----
  equity:
    rth_only: true
    rth_start_et: "09:30"
    rth_end_et: "16:00"
    allow_short: true
    htb_filter: none           # 'none' | 'easy_to_borrow_only'
    short_borrow_apr: 0.0025   # 0.25% annualized flat for backtest

